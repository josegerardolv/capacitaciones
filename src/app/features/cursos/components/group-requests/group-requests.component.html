<app-modal [isOpen]="isOpen" [config]="{ 
            title: '
            
            
             Pendientes Grupo' + (`: ${group?.name}` || ''), 
            subtitle: 'Seleccione solicitudes para acciones masivas', 
            showHeader: true, 
            padding: true, 
            size: 'fullscreen' }" (modalClose)="closeModal()">

    <div class="p-6" slot="">
        <div class="w-full">
            <!-- Toolbar: Pagination and Bulk Actions -->
            <div class="flex flex-col-reverse md:flex-row md:justify-between md:items-center gap-4 mb-4">
                <app-table-pagination [config]="paginationConfig" [showPageSizeSelector]="true"
                    [showPaginationControls]="false" (pageChange)="onPageChange($event)">
                </app-table-pagination>

                <!-- Indicadores de Conteo -->
                <!-- Indicadores de Conteo -->
                <div
                    class="flex flex-wrap gap-2 items-center justify-center md:justify-end mt-2 md:mt-0 ml-auto whitespace-nowrap">
                    <app-institutional-badge [config]="{variant: 'success', icon: 'check_circle', size: 'medium'}">
                        Aceptadas {{ acceptedCount }}
                    </app-institutional-badge>

                    <app-institutional-badge
                        [config]="{variant: 'warning', icon: 'notifications_active', size: 'medium'}">
                        Pendientes {{ pendingRequestsCount }}
                    </app-institutional-badge>

                    <app-institutional-badge [config]="{variant: 'danger', icon: 'cancel', size: 'medium'}">
                        Rechazadas {{ rejectCount }}
                    </app-institutional-badge>

                    <app-institutional-badge [config]="{variant: 'info', icon: 'people', size: 'medium'}">
                        Disponibles {{ availablePlaces }}/{{ group?.limitStudents || '0' }}
                    </app-institutional-badge>
                </div>

                <!-- Bulk Actions Toolbar -->
                <div class="flex gap-3 justify-end" *ngIf="showBulkActions">
                    <app-institutional-button [config]="{variant: 'success', icon: 'check', disabled: isGroupFull}"
                        (buttonClick)="processSelected('accept')">
                        Aceptar Seleccionados
                    </app-institutional-button>
                    <app-institutional-button [config]="{variant: 'danger', icon: 'close'}"
                        (buttonClick)="processSelected('reject')">
                        Rechazar Seleccionados
                    </app-institutional-button>
                </div>
            </div>

            <!-- Search Bar -->
            <app-table-filters [showGlobalSearch]="true" [globalSearchPlaceholder]="'Buscar por nombre, CURP...'"
                (globalSearchChange)="filterData($event)">
            </app-table-filters>

            <!-- Table -->
            <app-institutional-table [data]="requests" [columns]="tableColumns" [config]="tableConfig"
                [selectedItems]="selectedRequests" (selectionChange)="onSelectionChange($event)">
            </app-institutional-table>

            <!-- Bottom Pagination -->
            <div class="mt-4">
                <app-table-pagination [config]="paginationConfig" [showPageSizeSelector]="false"
                    [showPaginationControls]="true" (pageChange)="onPageChange($event)">
                </app-table-pagination>
            </div>
        </div>
    </div>

    <!-- Overlay de Carga para Acciones -->
    <div *ngIf="isLoadingAction" 
         class="fixed inset-0 z-[10000] flex items-center justify-center bg-black bg-opacity-50 backdrop-blur-sm transition-all duration-300">
        <app-loading-spinner 
            [title]="'Procesando'" 
            [message]="loadingActionMessage"
            [fullHeight]="false"
            class="transform scale-110">
        </app-loading-spinner>
    </div>

</app-modal>

<!-- Actions Template (Moved outside *ngIf to ensure availability) -->
<ng-template #actionsTemplate let-item>
    <div class="flex items-center justify-center gap-2">
        <app-institutional-button [config]="{
                variant: 'success', 
                size: 'small', 
                icon: 'check',
                disabled: isGroupFull,
                iconPosition: 'only'}" (buttonClick)="acceptRequest(item.id, item.enrollmentId, item.email)">
        </app-institutional-button>

        <app-institutional-button [config]="{
                variant: 'danger', 
                size: 'small', 
                icon: 'close',
                iconPosition: 'only'}" (buttonClick)="rejectRequest(item.id, item.enrollmentId, item.email)">
        </app-institutional-button>
    </div>
</ng-template>

<!-- Modales Genéricos de Confirmación -->
<app-confirmation-modal [isOpen]="isConfirmOpen" [config]="confirmConfig" (confirm)="onConfirmYes()"
    (cancel)="isConfirmOpen = false" (modalClose)="isConfirmOpen = false">
</app-confirmation-modal>

<!-- Modal de Alerta de Resultado (Éxito/Error Post-Carga) -->
<app-alert-modal [isOpen]="isResultModalOpen" [config]="resultModalConfig" (modalClose)="isResultModalOpen = false">
</app-alert-modal>
